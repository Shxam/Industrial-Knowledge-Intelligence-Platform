<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Primary Meta Tags -->
    <title>IKIP - Industrial Knowledge Intelligence Platform</title>
    <meta name="title" content="IKIP - Industrial Knowledge Intelligence Platform" />
    <meta name="description" content="AI-powered industrial knowledge management system for operations teams. Search documents, analyze failures, and inspect relationships." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ikip.app/" />
    <meta property="og:title" content="IKIP - Industrial Knowledge Intelligence Platform" />
    <meta property="og:description" content="AI-powered industrial knowledge management system for operations teams" />
    <meta property="og:image" content="/favicon.svg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://ikip.app/" />
    <meta property="twitter:title" content="IKIP - Industrial Knowledge Intelligence Platform" />
    <meta property="twitter:description" content="AI-powered industrial knowledge management system" />
    <meta property="twitter:image" content="/favicon.svg" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1677c7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IKIP" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect to API (performance optimization) -->
    <link rel="preconnect" href="http://localhost:8000" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
